/* ── App styles ── */
/* ============================================================
   ALGEBRA 2 LEARNING — GLOBAL DESIGN SYSTEM
   ============================================================ */

/* --- Google Fonts --- */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

/* --- CSS Custom Properties --- */
:root {
  /* Primary palette */
  --color-bg-primary: #0f172a;
  --color-bg-secondary: #1a2540;
  --color-bg-card: rgba(30, 41, 64, 0.85);
  --color-bg-card-hover: rgba(42, 58, 88, 0.9);
  --color-surface: #253354;
  --color-border: rgba(148, 163, 184, 0.25);
  --color-border-hover: rgba(148, 163, 184, 0.45);

  /* Accent Colors */
  --color-violet: #7c3aed;
  --color-violet-light: #a78bfa;
  --color-violet-glow: rgba(124, 58, 237, 0.3);
  --color-cyan: #06b6d4;
  --color-cyan-light: #67e8f9;
  --color-cyan-glow: rgba(6, 182, 212, 0.25);
  --color-amber: #f59e0b;
  --color-amber-light: #fbbf24;
  --color-rose: #f43f5e;
  --color-rose-light: #fb7185;
  --color-emerald: #10b981;
  --color-emerald-light: #34d399;
  --color-blue: #3b82f6;
  --color-blue-light: #60a5fa;
  --color-pink: #ec4899;
  --color-pink-light: #f472b6;
  --color-orange: #f97316;
  --color-orange-light: #fb923c;
  --color-indigo: #6366f1;
  --color-indigo-light: #818cf8;
  --color-teal: #14b8a6;
  --color-teal-light: #2dd4bf;

  /* Text */
  --color-text-primary: #f8fafc;
  --color-text-secondary: #c4d0de;
  --color-text-muted: #8fa0b4;
  --color-text-accent: var(--color-violet-light);

  /* Success / Error */
  --color-success: var(--color-emerald);
  --color-error: var(--color-rose);
  --color-warning: var(--color-amber);

  /* Typography */
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-heading: 'Space Grotesk', 'Inter', sans-serif;

  /* Sizing */
  --max-width: 1280px;
  --max-width-lesson: 860px;
  --header-height: 64px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;

  /* Shadows */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-glow-violet: 0 0 20px var(--color-violet-glow);
  --shadow-glow-cyan: 0 0 20px var(--color-cyan-glow);

  /* Transitions */
  --transition-fast: 0.15s ease;
  --transition-base: 0.25s ease;
  --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);

  /* Glassmorphism */
  --glass-bg: rgba(20, 32, 58, 0.80);
  --glass-border: rgba(148, 163, 184, 0.22);
  --glass-blur: blur(16px);
}

/* --- Reset & Base --- */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  font-family: var(--font-body);
  background: var(--color-bg-primary);
  color: var(--color-text-primary);
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Animated gradient background */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124, 58, 237, 0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6, 182, 212, 0.14) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(99, 102, 241, 0.10) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

a {
  color: var(--color-violet-light);
  text-decoration: none;
  transition: color var(--transition-fast);
}
a:hover { color: var(--color-cyan-light); }

img { max-width: 100%; display: block; }

/* --- Typography --- */
h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-heading);
  font-weight: 600;
  line-height: 1.3;
  color: var(--color-text-primary);
}

h1 { font-size: 2.5rem; letter-spacing: -0.03em; }
h2 { font-size: 1.75rem; letter-spacing: -0.02em; }
h3 { font-size: 1.35rem; letter-spacing: -0.01em; }
h4 { font-size: 1.1rem; }

p { color: var(--color-text-secondary); margin-bottom: 1rem; }

/* --- Layout --- */
.container {
  width: 100%;
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

.lesson-container {
  max-width: var(--max-width-lesson);
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

/* ============================================================
   HEADER / NAVIGATION
   ============================================================ */
.site-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--header-height);
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--glass-border);
  z-index: 100;
  display: flex;
  align-items: center;
}

.header-inner {
  width: 100%;
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 1.25rem;
  color: var(--color-text-primary);
  text-decoration: none;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--color-violet), var(--color-cyan));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  font-weight: 700;
  color: white;
}

.header-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-link {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  color: var(--color-text-secondary);
  font-size: 0.9rem;
  font-weight: 500;
  transition: all var(--transition-fast);
  text-decoration: none;
}
.nav-link:hover {
  color: var(--color-text-primary);
  background: rgba(148, 163, 184, 0.08);
}
.nav-link.active {
  color: var(--color-violet-light);
  background: rgba(124, 58, 237, 0.1);
}

.nav-progress {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: rgba(124, 58, 237, 0.1);
  border: 1px solid rgba(124, 58, 237, 0.2);
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--color-violet-light);
}

.nav-progress-ring {
  width: 20px;
  height: 20px;
}

/* Main content offset for fixed header */
main {
  padding-top: var(--header-height);
  min-height: 100vh;
}

/* ============================================================
   HERO SECTION
   ============================================================ */
.hero {
  padding: 80px 0 60px;
  text-align: center;
  position: relative;
}

.hero::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  background: rgba(124, 58, 237, 0.12);
  border: 1px solid rgba(124, 58, 237, 0.25);
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--color-violet-light);
  margin-bottom: 24px;
  animation: fadeInDown 0.6s ease;
}

.hero h1 {
  font-size: 3.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--color-text-primary) 0%, var(--color-violet-light) 50%, var(--color-cyan-light) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
  animation: fadeInDown 0.6s ease 0.1s both;
}

.hero-subtitle {
  font-size: 1.2rem;
  color: var(--color-text-secondary);
  max-width: 600px;
  margin: 0 auto 32px;
  animation: fadeInDown 0.6s ease 0.2s both;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 48px;
  animation: fadeInUp 0.6s ease 0.3s both;
}

.hero-stat {
  text-align: center;
}

.hero-stat-value {
  font-family: var(--font-heading);
  font-size: 2rem;
  font-weight: 700;
  color: var(--color-text-primary);
}

.hero-stat-value.violet { color: var(--color-violet-light); }
.hero-stat-value.cyan { color: var(--color-cyan-light); }
.hero-stat-value.amber { color: var(--color-amber-light); }

.hero-stat-label {
  font-size: 0.8rem;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 4px;
}

/* ============================================================
   UNIT CARDS GRID
   ============================================================ */
.units-section {
  padding: 40px 0 80px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}

.section-title {
  font-size: 1.5rem;
  color: var(--color-text-primary);
}

.section-subtitle {
  color: var(--color-text-muted);
  font-size: 0.9rem;
}

.units-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
}

.unit-card {
  position: relative;
  background: var(--color-bg-card);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 28px;
  cursor: pointer;
  transition: all var(--transition-base);
  overflow: hidden;
  text-decoration: none;
  display: block;
}

.unit-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--unit-accent, var(--color-violet));
  opacity: 0.7;
  transition: opacity var(--transition-fast);
}

.unit-card:hover {
  background: var(--color-bg-card-hover);
  border-color: var(--color-border-hover);
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.unit-card:hover::before { opacity: 1; }

.unit-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
}

.unit-number {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  font-family: var(--font-heading);
  font-size: 1.1rem;
  font-weight: 700;
  color: white;
  background: var(--unit-accent, var(--color-violet));
  flex-shrink: 0;
}

.unit-lesson-count {
  font-size: 0.75rem;
  color: var(--color-text-muted);
  padding: 4px 10px;
  background: rgba(148, 163, 184, 0.08);
  border-radius: 12px;
}

.unit-card h3 {
  font-size: 1.15rem;
  margin-bottom: 8px;
  color: var(--color-text-primary);
}

.unit-card p {
  font-size: 0.85rem;
  color: var(--color-text-muted);
  margin-bottom: 16px;
  line-height: 1.5;
}

.unit-progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(148, 163, 184, 0.1);
  border-radius: 2px;
  overflow: hidden;
}

.unit-progress-fill {
  height: 100%;
  background: var(--unit-accent, var(--color-violet));
  border-radius: 2px;
  transition: width var(--transition-slow);
  width: 0%;
}

/* Unit accent colors */
.unit-card[data-unit="1"]  { --unit-accent: var(--color-violet); }
.unit-card[data-unit="2"]  { --unit-accent: var(--color-blue); }
.unit-card[data-unit="3"]  { --unit-accent: var(--color-cyan); }
.unit-card[data-unit="4"]  { --unit-accent: var(--color-teal); }
.unit-card[data-unit="5"]  { --unit-accent: var(--color-emerald); }
.unit-card[data-unit="6"]  { --unit-accent: var(--color-amber); }
.unit-card[data-unit="7"]  { --unit-accent: var(--color-orange); }
.unit-card[data-unit="8"]  { --unit-accent: var(--color-rose); }
.unit-card[data-unit="9"]  { --unit-accent: var(--color-pink); }
.unit-card[data-unit="10"] { --unit-accent: var(--color-indigo); }
.unit-card[data-unit="11"] { --unit-accent: var(--color-blue); }

/* ============================================================
   UNIT PAGE
   ============================================================ */
.unit-hero {
  padding: 48px 0 32px;
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  color: var(--color-text-muted);
  margin-bottom: 20px;
}

.breadcrumb a {
  color: var(--color-text-muted);
  transition: color var(--transition-fast);
}
.breadcrumb a:hover { color: var(--color-violet-light); }
.breadcrumb .sep { opacity: 0.4; }

.unit-hero-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 12px;
}

.unit-hero-icon {
  width: 56px;
  height: 56px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-heading);
  font-size: 1.4rem;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.unit-hero h1 {
  font-size: 2rem;
  background: none;
  -webkit-text-fill-color: var(--color-text-primary);
}

.unit-hero p {
  font-size: 1rem;
  max-width: 640px;
}

.unit-progress-overview {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  margin-top: 24px;
}

.unit-progress-overview .progress-bar-wide {
  flex: 1;
  height: 8px;
  background: rgba(148, 163, 184, 0.1);
  border-radius: 4px;
  overflow: hidden;
}

.unit-progress-overview .progress-fill-wide {
  height: 100%;
  border-radius: 4px;
  transition: width var(--transition-slow);
}

.unit-progress-text {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--color-text-secondary);
  white-space: nowrap;
}

/* Lesson list */
.lessons-list {
  padding: 0 0 80px;
}

.lesson-item {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 20px 24px;
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  margin-bottom: 12px;
  cursor: pointer;
  transition: all var(--transition-base);
  text-decoration: none;
}

.lesson-item:hover {
  background: var(--color-bg-card-hover);
  border-color: var(--color-border-hover);
  transform: translateX(4px);
}

.lesson-number {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 0.85rem;
  flex-shrink: 0;
  border: 2px solid var(--color-border);
  color: var(--color-text-muted);
  transition: all var(--transition-base);
}

.lesson-item:hover .lesson-number {
  border-color: var(--unit-accent, var(--color-violet));
  color: var(--unit-accent, var(--color-violet));
}

.lesson-item.completed .lesson-number {
  background: var(--color-emerald);
  border-color: var(--color-emerald);
  color: white;
}

.lesson-info {
  flex: 1;
}

.lesson-info h4 {
  font-size: 1rem;
  margin-bottom: 2px;
  color: var(--color-text-primary);
}

.lesson-info p {
  font-size: 0.8rem;
  color: var(--color-text-muted);
  margin: 0;
}

.lesson-arrow {
  color: var(--color-text-muted);
  font-size: 1.2rem;
  transition: transform var(--transition-fast);
}
.lesson-item:hover .lesson-arrow {
  transform: translateX(4px);
  color: var(--unit-accent, var(--color-violet));
}

/* ============================================================
   LESSON PAGE
   ============================================================ */
.lesson-page {
  padding: 40px 0 80px;
}

.lesson-header {
  margin-bottom: 40px;
}

.lesson-header h1 {
  font-size: 2rem;
  margin-bottom: 8px;
  background: none;
  -webkit-text-fill-color: var(--color-text-primary);
}

.lesson-nav {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 24px;
}

.lesson-tab {
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--color-border);
  background: transparent;
  color: var(--color-text-secondary);
  transition: all var(--transition-fast);
}

.lesson-tab:hover {
  border-color: var(--color-border-hover);
  color: var(--color-text-primary);
}

.lesson-tab.active {
  background: var(--color-violet);
  border-color: var(--color-violet);
  color: white;
}

/* Lesson Sections */
.lesson-section {
  display: none;
  animation: fadeIn 0.3s ease;
}

.lesson-section.active {
  display: block;
}

.concept-card {
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 32px;
  margin-bottom: 24px;
}

.concept-card h2 {
  font-size: 1.4rem;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.concept-card h3 {
  font-size: 1.1rem;
  margin: 24px 0 12px;
  color: var(--color-text-primary);
}

.concept-card p,
.concept-card li {
  font-size: 0.95rem;
  color: var(--color-text-secondary);
  line-height: 1.8;
}

.concept-card ul,
.concept-card ol {
  margin: 12px 0;
  padding-left: 24px;
}

.concept-card li { margin-bottom: 8px; }

/* Key formula highlight box */
.formula-box {
  background: rgba(124, 58, 237, 0.08);
  border: 1px solid rgba(124, 58, 237, 0.2);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  margin: 20px 0;
  text-align: center;
}

.formula-box .katex {
  font-size: 1.4rem;
}

.formula-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-violet-light);
  margin-bottom: 8px;
  font-weight: 600;
}

/* Tip / Note boxes */
.tip-box {
  display: flex;
  gap: 12px;
  padding: 16px 20px;
  background: rgba(6, 182, 212, 0.06);
  border: 1px solid rgba(6, 182, 212, 0.15);
  border-left: 3px solid var(--color-cyan);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin: 20px 0;
}

.tip-box .tip-icon { font-size: 1.2rem; flex-shrink: 0; }

.tip-box p {
  color: var(--color-text-secondary);
  margin: 0;
  font-size: 0.9rem;
}

.warning-box {
  display: flex;
  gap: 12px;
  padding: 16px 20px;
  background: rgba(245, 158, 11, 0.06);
  border: 1px solid rgba(245, 158, 11, 0.15);
  border-left: 3px solid var(--color-amber);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin: 20px 0;
}

.warning-box .warning-icon { font-size: 1.2rem; flex-shrink: 0; }
.warning-box p { color: var(--color-text-secondary); margin: 0; font-size: 0.9rem; }

/* Example steps */
.example-step {
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 24px 28px;
  margin-bottom: 16px;
}

.example-step h4 {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  color: var(--color-cyan-light);
  font-size: 0.95rem;
}

.step-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--color-cyan);
  color: white;
  font-size: 0.75rem;
  font-weight: 700;
  flex-shrink: 0;
}

/* ============================================================
   QUIZ / PRACTICE ENGINE
   ============================================================ */
.quiz-container {
  max-width: 700px;
}

.quiz-progress {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}

.quiz-progress-bar {
  flex: 1;
  height: 6px;
  background: rgba(148, 163, 184, 0.1);
  border-radius: 3px;
  overflow: hidden;
}

.quiz-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--color-violet), var(--color-cyan));
  border-radius: 3px;
  transition: width var(--transition-slow);
}

.quiz-progress-text {
  font-size: 0.8rem;
  color: var(--color-text-muted);
  font-weight: 600;
  white-space: nowrap;
}

.quiz-question {
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 32px;
  margin-bottom: 20px;
  animation: fadeIn 0.3s ease;
}

.quiz-question h3 {
  margin-bottom: 20px;
  font-size: 1.1rem;
}

.quiz-question .question-text {
  font-size: 1rem;
  color: var(--color-text-primary);
  margin-bottom: 24px;
  line-height: 1.8;
}

/* Multiple choice */
.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.quiz-option {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  background: rgba(148, 163, 184, 0.04);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: 0.95rem;
  color: var(--color-text-secondary);
}

.quiz-option:hover {
  background: rgba(148, 163, 184, 0.08);
  border-color: var(--color-border-hover);
  color: var(--color-text-primary);
}

.quiz-option.selected {
  border-color: var(--color-violet);
  background: rgba(124, 58, 237, 0.08);
  color: var(--color-text-primary);
}

.quiz-option.correct {
  border-color: var(--color-emerald);
  background: rgba(16, 185, 129, 0.08);
  color: var(--color-emerald-light);
}

.quiz-option.incorrect {
  border-color: var(--color-rose);
  background: rgba(244, 63, 94, 0.08);
  color: var(--color-rose-light);
}

.option-letter {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--color-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 0.8rem;
  flex-shrink: 0;
  transition: all var(--transition-fast);
}

.quiz-option.selected .option-letter {
  border-color: var(--color-violet);
  background: var(--color-violet);
  color: white;
}

.quiz-option.correct .option-letter {
  border-color: var(--color-emerald);
  background: var(--color-emerald);
  color: white;
}

.quiz-option.incorrect .option-letter {
  border-color: var(--color-rose);
  background: var(--color-rose);
  color: white;
}

/* Fill-in-the-blank */
.quiz-input-group {
  display: flex;
  gap: 12px;
  align-items: center;
}

.quiz-input {
  flex: 1;
  padding: 12px 18px;
  background: rgba(148, 163, 184, 0.06);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: 1rem;
  outline: none;
  transition: border-color var(--transition-fast);
}

.quiz-input:focus {
  border-color: var(--color-violet);
}

.quiz-input.correct { border-color: var(--color-emerald); }
.quiz-input.incorrect { border-color: var(--color-rose); }

/* Feedback */
.quiz-feedback {
  padding: 16px 20px;
  border-radius: var(--radius-md);
  margin-top: 16px;
  font-size: 0.9rem;
  display: none;
  animation: fadeIn 0.3s ease;
}

.quiz-feedback.show { display: block; }

.quiz-feedback.correct {
  background: rgba(16, 185, 129, 0.08);
  border: 1px solid rgba(16, 185, 129, 0.2);
  color: var(--color-emerald-light);
}

.quiz-feedback.incorrect {
  background: rgba(244, 63, 94, 0.08);
  border: 1px solid rgba(244, 63, 94, 0.2);
  color: var(--color-rose-light);
}

/* Quiz buttons */
.quiz-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

/* Score card */
.quiz-score {
  text-align: center;
  padding: 40px;
  animation: fadeIn 0.4s ease;
}

.quiz-score-ring {
  width: 120px;
  height: 120px;
  margin: 0 auto 20px;
}

.quiz-score h2 {
  font-size: 1.5rem;
  margin-bottom: 8px;
}

.quiz-score p {
  color: var(--color-text-muted);
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all var(--transition-fast);
  text-decoration: none;
}

.btn-primary {
  background: linear-gradient(135deg, var(--color-violet), #6d28d9);
  color: white;
  box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4);
  color: white;
}

.btn-secondary {
  background: rgba(148, 163, 184, 0.08);
  border: 1px solid var(--color-border);
  color: var(--color-text-secondary);
}
.btn-secondary:hover {
  background: rgba(148, 163, 184, 0.14);
  color: var(--color-text-primary);
}

.btn-success {
  background: linear-gradient(135deg, var(--color-emerald), #059669);
  color: white;
}

.btn-sm {
  padding: 6px 14px;
  font-size: 0.8rem;
}

.btn-lg {
  padding: 14px 32px;
  font-size: 1rem;
}

/* ============================================================
   FORMULA SHEET PAGE
   ============================================================ */
.formula-search {
  position: relative;
  margin-bottom: 32px;
}

.formula-search input {
  width: 100%;
  padding: 14px 20px 14px 48px;
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text-primary);
  font-size: 1rem;
  font-family: var(--font-body);
  outline: none;
  transition: border-color var(--transition-fast);
}

.formula-search input:focus {
  border-color: var(--color-violet);
}

.formula-search .search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--color-text-muted);
  font-size: 1.1rem;
}

.formula-grid {
  display: grid;
  gap: 16px;
}

.formula-card {
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 24px;
  transition: all var(--transition-base);
}

.formula-card:hover {
  border-color: var(--color-border-hover);
}

.formula-card h4 {
  font-size: 0.95rem;
  color: var(--color-violet-light);
  margin-bottom: 12px;
}

.formula-card .katex { font-size: 1.2rem; }

.formula-card p {
  font-size: 0.85rem;
  color: var(--color-text-muted);
  margin-top: 8px;
  margin-bottom: 0;
}

/* ============================================================
   FOOTER
   ============================================================ */
.site-footer {
  padding: 40px 0;
  border-top: 1px solid var(--color-border);
  text-align: center;
  position: relative;
  z-index: 1;
}

.site-footer p {
  font-size: 0.85rem;
  color: var(--color-text-muted);
}

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}

/* Staggered card animations */
.unit-card { animation: fadeInUp 0.4s ease backwards; }
.unit-card:nth-child(1)  { animation-delay: 0.05s; }
.unit-card:nth-child(2)  { animation-delay: 0.10s; }
.unit-card:nth-child(3)  { animation-delay: 0.15s; }
.unit-card:nth-child(4)  { animation-delay: 0.20s; }
.unit-card:nth-child(5)  { animation-delay: 0.25s; }
.unit-card:nth-child(6)  { animation-delay: 0.30s; }
.unit-card:nth-child(7)  { animation-delay: 0.35s; }
.unit-card:nth-child(8)  { animation-delay: 0.40s; }
.unit-card:nth-child(9)  { animation-delay: 0.45s; }
.unit-card:nth-child(10) { animation-delay: 0.50s; }
.unit-card:nth-child(11) { animation-delay: 0.55s; }

.lesson-item { animation: slideInLeft 0.3s ease backwards; }
.lesson-item:nth-child(1) { animation-delay: 0.05s; }
.lesson-item:nth-child(2) { animation-delay: 0.10s; }
.lesson-item:nth-child(3) { animation-delay: 0.15s; }
.lesson-item:nth-child(4) { animation-delay: 0.20s; }
.lesson-item:nth-child(5) { animation-delay: 0.25s; }
.lesson-item:nth-child(6) { animation-delay: 0.30s; }
.lesson-item:nth-child(7) { animation-delay: 0.35s; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 768px) {
  h1 { font-size: 1.8rem; }
  .hero h1 { font-size: 2.2rem; }
  .hero { padding: 48px 0 40px; }
  .hero-stats { gap: 24px; }
  .hero-stat-value { font-size: 1.5rem; }
  .units-grid { grid-template-columns: 1fr; }
  .header-nav { display: none; }
  .unit-card { padding: 20px; }
  .lesson-tab { padding: 6px 14px; font-size: 0.8rem; }
  .concept-card { padding: 20px; }
}

@media (max-width: 480px) {
  .container, .lesson-container { padding: 0 16px; }
  .hero h1 { font-size: 1.8rem; }
  .hero-subtitle { font-size: 1rem; }
  .hero-stats { flex-direction: column; gap: 12px; }
}

/* ============================================================
   KATEX SIZE OVERRIDES
   ============================================================ */
.katex { font-size: 1.1em; }
.concept-card .katex { font-size: 1.05em; }
.formula-box .katex { font-size: 1.3em; }
.quiz-question .katex { font-size: 1.1em; }

/* ============================================================
   ACCESSIBILITY — SKIP LINK & FOCUS RINGS
   ============================================================ */
.skip-link {
  position: absolute;
  top: -100px;
  left: 16px;
  z-index: 9999;
  padding: 8px 20px;
  background: var(--color-violet);
  color: #fff;
  font-weight: 600;
  font-size: 0.9rem;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  text-decoration: none;
  transition: top 0.2s ease;
}
.skip-link:focus {
  top: 0;
  outline: 3px solid var(--color-violet-light);
  outline-offset: 2px;
}

/* Global visible focus rings */
:focus-visible {
  outline: 2px solid var(--color-violet-light);
  outline-offset: 3px;
  border-radius: 4px;
}

.btn:focus-visible,
.quiz-option:focus-visible,
.lesson-tab:focus-visible,
.nav-link:focus-visible,
.unit-card:focus-visible,
.lesson-item:focus-visible {
  outline: 2px solid var(--color-violet-light);
  outline-offset: 3px;
}

/* ============================================================
   MOBILE HAMBURGER MENU
   ============================================================ */
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.mobile-menu-btn {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 36px;
  height: 36px;
  padding: 6px;
  background: none;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
}

.mobile-menu-btn span {
  display: block;
  width: 100%;
  height: 2px;
  background: var(--color-text-secondary);
  border-radius: 2px;
  transition: all 0.25s ease;
  transform-origin: center;
}

.mobile-menu-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.mobile-menu-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.mobile-menu-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

@media (max-width: 768px) {
  .mobile-menu-btn { display: flex; }

  .header-nav {
    display: none;
    position: absolute;
    top: 64px;
    left: 0;
    right: 0;
    flex-direction: column;
    background: rgba(15, 23, 42, 0.97);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--color-border);
    padding: 16px 24px 24px;
    gap: 4px;
    z-index: 98;
    animation: fadeInDown 0.2s ease;
  }
  .header-nav.open { display: flex; }
  .header-nav .nav-link {
    padding: 12px 8px;
    font-size: 1rem;
    border-bottom: 1px solid var(--color-border);
  }
  .header-nav .nav-link:last-child { border-bottom: none; }
}

/* ============================================================
   RESPONSIVE — ADDITIONAL FIXES
   ============================================================ */
@media (max-width: 768px) {
  .quiz-progress {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }
  .quiz-actions { flex-direction: column; }
  .quiz-actions .btn { width: 100%; justify-content: center; }

  .lesson-nav { gap: 4px; }

  .formula-grid { grid-template-columns: 1fr; }

  .grapher-wrap { flex-direction: column; height: auto; }
  .grapher-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--color-border); max-height: 300px; overflow-y: auto; }
  .grapher-canvas-area { height: 400px; }
}

@media (max-width: 480px) {
  .lesson-tab { padding: 5px 10px; font-size: 0.78rem; }
  .unit-hero { padding: 24px 0; }
  .quiz-score { padding: 24px 16px; }
}

/* ============================================================
   FUNCTION GRAPHER
   ============================================================ */
.grapher-wrap {
  display: flex;
  gap: 0;
  height: 560px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  overflow: hidden;
  background: var(--color-bg-card);
}

.grapher-sidebar {
  width: 260px;
  flex-shrink: 0;
  border-right: 1px solid var(--color-border);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
}

.grapher-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--color-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin: 0;
}

.grapher-fn-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.grapher-fn-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.grapher-fn-swatch {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

.grapher-fn-prefix {
  font-size: 0.82rem;
  color: var(--color-text-muted);
  flex-shrink: 0;
}

.grapher-fn-input {
  flex: 1;
  min-width: 0;
  padding: 6px 10px;
  background: rgba(148, 163, 184, 0.06);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  color: var(--color-text-primary);
  font-family: 'JetBrains Mono', 'Fira Code', monospace, var(--font-body);
  font-size: 0.85rem;
  outline: none;
  transition: border-color var(--transition-fast);
}
.grapher-fn-input:focus { border-color: var(--color-violet); }

.grapher-fn-remove {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: none;
  background: rgba(244, 63, 94, 0.12);
  color: var(--color-rose);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition-fast);
}
.grapher-fn-remove:hover { background: rgba(244, 63, 94, 0.25); }

.grapher-fn-error {
  font-size: 0.72rem;
  color: var(--color-rose);
  margin-top: 2px;
}

.grapher-presets-label {
  font-size: 0.78rem;
  color: var(--color-text-muted);
  margin: 4px 0 4px;
}

.grapher-presets {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.grapher-preset-btn {
  text-align: left;
  padding: 5px 10px;
  background: rgba(148, 163, 184, 0.04);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  color: var(--color-violet-light);
  font-family: 'JetBrains Mono', monospace, var(--font-body);
  font-size: 0.82rem;
  cursor: pointer;
  transition: all var(--transition-fast);
}
.grapher-preset-btn:hover {
  background: rgba(124, 58, 237, 0.08);
  border-color: var(--color-violet);
}

.grapher-canvas-area {
  flex: 1;
  position: relative;
  min-width: 0;
}

#graph-canvas {
  display: block;
  width: 100%;
  height: 100%;
  cursor: crosshair;
}

.grapher-zoom-controls {
  position: absolute;
  top: 12px;
  right: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.grapher-ctrl-btn {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(8px);
  color: var(--color-text-secondary);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}
.grapher-ctrl-btn:hover {
  background: rgba(124, 58, 237, 0.15);
  border-color: var(--color-violet);
  color: var(--color-violet-light);
}

.coord-display {
  position: absolute;
  bottom: 10px;
  right: 12px;
  font-size: 0.75rem;
  font-family: monospace;
  color: rgba(148, 163, 184, 0.6);
  pointer-events: none;
}

// Wraps KaTeX auto-render to handle async CDN loading

let _resolvers = [];
let _ready = false;

window.__katexReady = function () {
  _ready = true;
  _resolvers.forEach(fn => fn());
  _resolvers = [];
};

// If KaTeX already loaded before this module ran
if (window.__katexLoaded) {
  _ready = true;
}

function waitForKaTeX() {
  if (_ready) return Promise.resolve();
  return new Promise(resolve => _resolvers.push(resolve));
}

async function renderMath(container = document.body) {
  await waitForKaTeX();
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(container, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
        { left: '\\(', right: '\\)', display: false },
        { left: '\\[', right: '\\]', display: true },
      ],
      throwOnError: false,
    });
  }
}

// ── components/quiz.js ──────────────────────────────────────────────────
// components/quiz.js — Interactive Quiz Engine


/**
 * Render a quiz into a mount element.
 * @param {HTMLElement} mount - Container element
 * @param {Array} problems - Array of problem objects
 * @param {string} lessonId - Lesson ID for progress saving
 * @param {string} accent - CSS color for styling
 * @param {Function} onComplete - Called with (lessonId, score, total) on finish
 * @param {Function} onUpdate - Called after progress saved (e.g. refresh header)
 */
function renderQuiz(mount, problems, lessonId, accent, onComplete, onUpdate) {
  let current = 0;
  let score = 0;
  const results = []; // {answered: bool, correct: bool}

  function render() {
    if (current >= problems.length) {
      showScore();
      return;
    }
    const q = problems[current];
    const diffLabel = current < 2 ? 'Easy' : current < 4 ? 'Medium' : 'Hard';
    const diffColor = current < 2 ? 'var(--color-emerald)' : current < 4 ? 'var(--color-amber)' : 'var(--color-rose)';
    const diffBg    = current < 2 ? 'rgba(16,185,129,0.1)' : current < 4 ? 'rgba(245,158,11,0.1)' : 'rgba(244,63,94,0.1)';
    const diffBorder= current < 2 ? 'rgba(16,185,129,0.25)' : current < 4 ? 'rgba(245,158,11,0.25)' : 'rgba(244,63,94,0.25)';
    mount.innerHTML = `
      <div class="quiz-container">
        <div class="quiz-progress">
          <div class="quiz-progress-bar">
            <div class="quiz-progress-fill" style="width:${(current / problems.length) * 100}%"></div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="quiz-progress-text">Question ${current + 1} of ${problems.length}</span>
            <span style="font-size:0.72rem;font-weight:600;padding:2px 8px;border-radius:10px;background:${diffBg};color:${diffColor};border:1px solid ${diffBorder}">${diffLabel}</span>
          </div>
        </div>
        <div class="quiz-question" role="group" aria-label="Question ${current + 1}">
          <div class="question-text">${q.question}</div>
          ${q.type === 'mc' ? renderMC(q) : renderFill(q)}
          <div class="quiz-feedback" id="feedback" role="alert" aria-live="polite"></div>
          <div class="quiz-actions">
            <button class="btn btn-primary" id="check-btn">Check Answer</button>
            <button class="btn btn-secondary" id="next-btn" style="display:none">
              ${current < problems.length - 1 ? 'Next Question →' : 'See Results'}
            </button>
          </div>
        </div>
      </div>
    `;

    renderMath(mount);

    document.getElementById('check-btn').addEventListener('click', checkAnswer);
    document.getElementById('next-btn').addEventListener('click', () => {
      current++;
      render();
    });

    if (q.type === 'fill') {
      const input = document.getElementById('fill-input');
      if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
    }
  }

  function renderMC(q) {
    const letters = ['A', 'B', 'C', 'D', 'E'];
    return `
      <div class="quiz-options" id="options">
        ${q.choices.map((c, i) => `
          <div class="quiz-option" data-idx="${i}" style="cursor:pointer">
            <span class="option-letter">${letters[i]}</span>
            <span>${c}</span>
          </div>
        `).join('')}
      </div>
      <input type="hidden" id="selected-option" value="">
    `;
  }

  function renderFill(q) {
    return `
      <div class="quiz-input-group">
        <input type="text" class="quiz-input" id="fill-input"
               placeholder="Type your answer here…" autocomplete="off">
      </div>
    `;
  }

  function setupMCListeners() {
    const options = mount.querySelectorAll('.quiz-option');
    options.forEach(opt => {
      opt.addEventListener('click', () => {
        if (mount.querySelector('#selected-option').value !== '') return; // already answered
        options.forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        mount.querySelector('#selected-option').value = opt.dataset.idx;
      });
    });
  }

  function checkAnswer() {
    const q = problems[current];
    const checkBtn = document.getElementById('check-btn');
    const nextBtn = document.getElementById('next-btn');
    const feedback = document.getElementById('feedback');
    let isCorrect = false;

    if (q.type === 'mc') {
      setupMCListeners(); // ensure listeners on re-render
      const selected = mount.querySelector('#selected-option')?.value;
      if (selected === '') {
        feedback.textContent = 'Please select an answer first.';
        feedback.className = 'quiz-feedback show incorrect';
        return;
      }
      isCorrect = parseInt(selected) === q.correct;
      const options = mount.querySelectorAll('.quiz-option');
      options.forEach((opt, i) => {
        if (i === q.correct) opt.classList.add('correct');
        else if (i === parseInt(selected) && !isCorrect) opt.classList.add('incorrect');
        opt.style.cursor = 'default';
        opt.style.pointerEvents = 'none';
      });
    } else {
      const input = document.getElementById('fill-input');
      const userAnswer = normalizeAnswer(input?.value || '');
      const correctAnswers = [q.answer, ...(q.altAnswers || [])].map(normalizeAnswer);
      isCorrect = correctAnswers.includes(userAnswer);
      if (input) {
        input.classList.add(isCorrect ? 'correct' : 'incorrect');
        input.disabled = true;
      }
    }

    if (isCorrect) score++;

    feedback.innerHTML = isCorrect
      ? `✓ Correct! ${q.explanation}`
      : `✗ Not quite. ${q.explanation}`;
    feedback.className = `quiz-feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

    checkBtn.style.display = 'none';
    nextBtn.style.display = '';

    renderMath(feedback);
  }

  function normalizeAnswer(str) {
    return str.trim().toLowerCase()
      .replace(/\s+/g, '')
      .replace(/×/g, '*')
      .replace(/÷/g, '/')
      .replace(/[−–]/g, '-');
  }

  function showScore() {
    const pct = Math.round((score / problems.length) * 100);
    const mastered = pct >= 80;
    const emoji = pct === 100 ? '🏆' : pct >= 80 ? '⭐' : pct >= 60 ? '👍' : '📚';
    const message = pct === 100 ? 'Perfect score! Outstanding!' :
                    pct >= 80 ? 'Great job! Lesson mastered!' :
                    pct >= 60 ? 'Good effort! Review and try again.' :
                    'Keep practicing — you\'ve got this!';

    mount.innerHTML = `
      <div class="quiz-score concept-card">
        <div style="font-size:3.5rem;margin-bottom:16px">${emoji}</div>
        <h2>${pct}% — ${mastered ? 'Mastered!' : 'Keep Going!'}</h2>
        <p>${message}</p>
        <p style="font-size:0.9rem;margin-top:4px;color:var(--color-text-muted)">${score} out of ${problems.length} correct</p>
        <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <button class="btn btn-secondary" id="retry-btn">Try Again</button>
          ${mastered ? `<div style="padding:10px 20px;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);border-radius:8px;color:var(--color-emerald);font-weight:600;font-size:0.9rem">✓ Lesson Mastered!</div>` : ''}
        </div>
      </div>
    `;

    onComplete(lessonId, score, problems.length);
    if (onUpdate) onUpdate();

    document.getElementById('retry-btn').addEventListener('click', () => {
      current = 0;
      score = 0;
      render();
    });
  }

  // Attach MC listeners after initial render using event delegation
  mount.addEventListener('click', e => {
    const opt = e.target.closest('.quiz-option');
    if (!opt) return;
    const selected = mount.querySelector('#selected-option');
    if (!selected || selected.value !== '') return;
    mount.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    selected.value = opt.dataset.idx;
  });

  render();
}

// ── components/grapher.js ───────────────────────────────────────────────
// components/grapher.js — Canvas-based interactive function plotter

const COLORS = ['#7c3aed', '#3b82f6', '#10b981', '#f97316', '#f43f5e', '#06b6d4', '#ec4899'];

/**
 * Safely evaluate a math expression at x.
 * Supports: +, -, *, /, ^, sin, cos, tan, sqrt, abs, log, ln, exp, pi, e
 */
function evalAt(expr, x) {
  const code = expr.trim()
    .replace(/\^/g,              '**')
    .replace(/(\d)(x)/g,         '$1*$2')
    .replace(/(x)(\d)/g,         '$1*$2')
    .replace(/(\d)\(/g,           '$1*(')
    .replace(/\bsin\b/g,          'Math.sin')
    .replace(/\bcos\b/g,          'Math.cos')
    .replace(/\btan\b/g,          'Math.tan')
    .replace(/\bsqrt\b/g,         'Math.sqrt')
    .replace(/\babs\b/g,          'Math.abs')
    .replace(/\bln\b/g,           'Math.log')
    .replace(/\blog\b/g,          'Math.log10')
    .replace(/\bexp\b/g,          'Math.exp')
    .replace(/\bpi\b/gi,          'Math.PI')
    .replace(/(?<![a-zA-Z])e(?![a-zA-Z])/g, 'Math.E');
  try {
    // eslint-disable-next-line no-new-func
    const y = new Function('x', '"use strict"; return (' + code + ');')(x);
    return typeof y === 'number' && isFinite(y) ? y : NaN;
  } catch {
    return NaN;
  }
}

function niceStep(rawRange, targetDivisions) {
  const raw  = rawRange / targetDivisions;
  const pow  = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / pow;
  if (norm < 1.5) return pow;
  if (norm < 3.5) return 2 * pow;
  if (norm < 7.5) return 5 * pow;
  return 10 * pow;
}

function fmt(n) {
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 100) return n.toFixed(0);
  if (abs >= 10)  return parseFloat(n.toPrecision(3)).toString();
  if (abs >= 1)   return parseFloat(n.toPrecision(3)).toString();
  return parseFloat(n.toPrecision(2)).toString();
}

function renderGrapher(container) {
  let colorCursor = 0;
  function nextColor() { return COLORS[colorCursor++ % COLORS.length]; }

  container.innerHTML = `
    <div class="grapher-wrap">
      <div class="grapher-sidebar">
        <p class="grapher-title">Functions</p>
        <div class="grapher-fn-list" id="grapher-fn-list"></div>
        <button class="btn btn-secondary btn-sm" id="add-fn-btn">+ Add Function</button>
        <div class="grapher-presets">
          <p class="grapher-presets-label">Quick examples:</p>
          ${['x^2', 'x^3 - x', 'sin(x)', 'cos(x)', 'sqrt(x)', '2^x', 'log(x)', '1/x', 'abs(x)', 'x^2 - 4'].map(fn =>
            `<button class="grapher-preset-btn" data-fn="${fn}">${fn}</button>`
          ).join('')}
        </div>
      </div>
      <div class="grapher-canvas-area">
        <canvas id="graph-canvas"></canvas>
        <div class="grapher-zoom-controls">
          <button class="grapher-ctrl-btn" id="zoom-in-btn"  title="Zoom in">+</button>
          <button class="grapher-ctrl-btn" id="zoom-out-btn" title="Zoom out">−</button>
          <button class="grapher-ctrl-btn" id="reset-btn"    title="Reset view">⊙</button>
        </div>
        <div id="coord-display" class="coord-display" aria-live="off"></div>
      </div>
    </div>
  `;

  const canvas  = document.getElementById('graph-canvas');
  const ctx     = canvas.getContext('2d');
  const fnList  = document.getElementById('grapher-fn-list');

  // ---- State ----
  let view = { xMin: -10, xMax: 10, yMin: -8, yMax: 8 };
  let fns  = [];   // { id, expr, color, error }
  let drag = null; // { startX, startY, viewAtStart }
  let pinch = null;

  // ---- Function management ----
  function addFn(expr) {
    fns.push({ id: Date.now() + Math.random(), expr: expr || '', color: nextColor(), error: false });
    rebuildFnList();
    draw();
  }

  function removeFn(id) {
    fns = fns.filter(f => f.id !== id);
    rebuildFnList();
    draw();
  }

  function setFnExpr(id, expr) {
    const f = fns.find(f => f.id === id);
    if (f) { f.expr = expr; f.error = false; }
    draw();
    updateErrorFlags();
  }

  function updateErrorFlags() {
    fnList.querySelectorAll('.grapher-fn-row').forEach(row => {
      const id  = Number(row.dataset.id);
      const f   = fns.find(f => f.id === id);
      const err = row.querySelector('.grapher-fn-error');
      if (err && f) err.style.display = f.error ? 'inline' : 'none';
    });
  }

  function rebuildFnList() {
    fnList.innerHTML = fns.map(f => `
      <div class="grapher-fn-row" data-id="${f.id}">
        <span class="grapher-fn-swatch" style="background:${f.color}" aria-hidden="true"></span>
        <span class="grapher-fn-prefix">y =</span>
        <input class="grapher-fn-input" type="text" value="${escHtml(f.expr)}"
               placeholder="e.g. x^2" spellcheck="false" autocomplete="off"
               aria-label="Function expression">
        <button class="grapher-fn-remove" aria-label="Remove this function">×</button>
        <span class="grapher-fn-error" style="display:none">invalid</span>
      </div>
    `).join('');

    fnList.querySelectorAll('.grapher-fn-input').forEach(input => {
      const id = Number(input.closest('.grapher-fn-row').dataset.id);
      input.addEventListener('input', () => setFnExpr(id, input.value));
    });
    fnList.querySelectorAll('.grapher-fn-remove').forEach(btn => {
      const id = Number(btn.closest('.grapher-fn-row').dataset.id);
      btn.addEventListener('click', () => removeFn(id));
    });
  }

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
  }

  // ---- Resize ----
  function resize() {
    const area   = canvas.parentElement;
    canvas.width  = area.clientWidth;
    canvas.height = area.clientHeight;
    draw();
  }

  const ro = new ResizeObserver(resize);
  ro.observe(canvas.parentElement);

  // ---- Coordinate transforms ----
  function toCanvas(wx, wy) {
    return {
      cx: (wx - view.xMin) / (view.xMax - view.xMin) * canvas.width,
      cy: (1 - (wy - view.yMin) / (view.yMax - view.yMin)) * canvas.height,
    };
  }

  function toWorld(cx, cy) {
    return {
      wx: view.xMin + (cx / canvas.width)  * (view.xMax - view.xMin),
      wy: view.yMin + (1 - cy / canvas.height) * (view.yMax - view.yMin),
    };
  }

  // ---- Drawing ----
  function draw() {
    if (!canvas.width || !canvas.height) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawAxes();
    fns.forEach(f => { if (f.expr.trim()) drawFn(f); });
  }

  function drawGrid() {
    const xStep = niceStep(view.xMax - view.xMin, 10);
    const yStep = niceStep(view.yMax - view.yMin, 8);
    ctx.strokeStyle = 'rgba(148,163,184,0.09)';
    ctx.lineWidth   = 1;

    const xStart = Math.ceil(view.xMin / xStep) * xStep;
    for (let wx = xStart; wx <= view.xMax + xStep * 0.01; wx += xStep) {
      const { cx } = toCanvas(wx, 0);
      ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
    }
    const yStart = Math.ceil(view.yMin / yStep) * yStep;
    for (let wy = yStart; wy <= view.yMax + yStep * 0.01; wy += yStep) {
      const { cy } = toCanvas(0, wy);
      ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
    }

    // Axis number labels
    ctx.fillStyle = 'rgba(148,163,184,0.55)';
    ctx.font      = '11px system-ui,sans-serif';
    const origin  = toCanvas(0, 0);
    const axisLabelY = Math.min(Math.max(origin.cy + 15, 14), canvas.height - 4);
    const axisLabelX = Math.min(Math.max(origin.cx - 6,  4), canvas.width  - 4);

    ctx.textAlign = 'center';
    for (let wx = xStart; wx <= view.xMax + xStep * 0.01; wx += xStep) {
      if (Math.abs(wx) < xStep * 0.01) continue;
      const { cx } = toCanvas(wx, 0);
      if (cx < 4 || cx > canvas.width - 4) continue;
      ctx.fillText(fmt(wx), cx, axisLabelY);
    }

    ctx.textAlign = 'right';
    for (let wy = yStart; wy <= view.yMax + yStep * 0.01; wy += yStep) {
      if (Math.abs(wy) < yStep * 0.01) continue;
      const { cy } = toCanvas(0, wy);
      if (cy < 10 || cy > canvas.height - 4) continue;
      ctx.fillText(fmt(wy), axisLabelX, cy + 4);
    }
  }

  function drawAxes() {
    ctx.strokeStyle = 'rgba(148,163,184,0.45)';
    ctx.lineWidth   = 1.5;
    const { cx: ox, cy: oy } = toCanvas(0, 0);

    if (view.yMin <= 0 && view.yMax >= 0) {
      ctx.beginPath(); ctx.moveTo(0, oy); ctx.lineTo(canvas.width, oy); ctx.stroke();
    }
    if (view.xMin <= 0 && view.xMax >= 0) {
      ctx.beginPath(); ctx.moveTo(ox, 0); ctx.lineTo(ox, canvas.height); ctx.stroke();
    }

    // Axis labels
    ctx.fillStyle   = 'rgba(148,163,184,0.6)';
    ctx.font        = 'italic 13px system-ui,sans-serif';
    const xLabelCx  = Math.min(Math.max(ox, 4), canvas.width - 16);
    const yLabelCy  = Math.min(Math.max(oy, 4), canvas.height - 16);
    ctx.textAlign   = 'left';
    ctx.fillText('x', canvas.width - 12, yLabelCy + 4);
    ctx.textAlign   = 'center';
    ctx.fillText('y', xLabelCx, 14);
  }

  function drawFn(f) {
    const steps = Math.min(canvas.width * 2, 2000);
    const dx    = (view.xMax - view.xMin) / steps;
    const range = view.yMax - view.yMin;

    ctx.strokeStyle = f.color;
    ctx.lineWidth   = 2.5;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    ctx.beginPath();

    let penDown = false;
    let prevY   = NaN;
    let anyValid = false;

    for (let i = 0; i <= steps; i++) {
      const wx  = view.xMin + i * dx;
      const wy  = evalAt(f.expr, wx);
      const { cx, cy } = toCanvas(wx, wy);

      if (isNaN(wy)) {
        penDown = false; prevY = NaN;
        continue;
      }

      anyValid = true;

      // Discontinuity: large vertical jump → lift pen
      if (penDown && !isNaN(prevY) && Math.abs(wy - prevY) > range * 4) {
        penDown = false;
      }

      if (!penDown) { ctx.moveTo(cx, cy); penDown = true; }
      else          { ctx.lineTo(cx, cy); }

      prevY = wy;
    }
    ctx.stroke();

    f.error = !anyValid && f.expr.trim().length > 0;
    updateErrorFlags();
  }

  // ---- Pan & Zoom ----
  canvas.addEventListener('mousedown', e => {
    drag = { startX: e.clientX, startY: e.clientY, viewAtStart: { ...view } };
    canvas.style.cursor = 'grabbing';
  });

  window.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (drag) {
      const dx = e.clientX - drag.startX;
      const dy = e.clientY - drag.startY;
      const { xMin, xMax, yMin, yMax } = drag.viewAtStart;
      const wdx = -dx / canvas.width  * (xMax - xMin);
      const wdy =  dy / canvas.height * (yMax - yMin);
      view = { xMin: xMin + wdx, xMax: xMax + wdx, yMin: yMin + wdy, yMax: yMax + wdy };
      draw();
    }

    if (mx >= 0 && mx <= canvas.width && my >= 0 && my <= canvas.height) {
      const { wx, wy } = toWorld(mx, my);
      const el = document.getElementById('coord-display');
      if (el) el.textContent = `(${fmt(wx)}, ${fmt(wy)})`;
    }
  });

  window.addEventListener('mouseup', () => {
    drag = null;
    canvas.style.cursor = 'crosshair';
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const { wx, wy } = toWorld(e.clientX - rect.left, e.clientY - rect.top);
    const factor = e.deltaY > 0 ? 1.15 : 1 / 1.15;
    view = {
      xMin: wx + (view.xMin - wx) * factor,
      xMax: wx + (view.xMax - wx) * factor,
      yMin: wy + (view.yMin - wy) * factor,
      yMax: wy + (view.yMax - wy) * factor,
    };
    draw();
  }, { passive: false });

  // Touch: pan & pinch-zoom
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      drag = { startX: e.touches[0].clientX, startY: e.touches[0].clientY, viewAtStart: { ...view } };
      pinch = null;
    } else if (e.touches.length === 2) {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      const my = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      pinch = {
        d0: Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY),
        pivot: toWorld(mx, my),
        viewAtStart: { ...view },
      };
      drag = null;
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (drag && e.touches.length === 1) {
      const dx = e.touches[0].clientX - drag.startX;
      const dy = e.touches[0].clientY - drag.startY;
      const { xMin, xMax, yMin, yMax } = drag.viewAtStart;
      view = {
        xMin: xMin - dx / canvas.width  * (xMax - xMin),
        xMax: xMax - dx / canvas.width  * (xMax - xMin),
        yMin: yMin + dy / canvas.height * (yMax - yMin),
        yMax: yMax + dy / canvas.height * (yMax - yMin),
      };
      draw();
    } else if (pinch && e.touches.length === 2) {
      const d      = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const factor = pinch.d0 / d;
      const { wx, wy } = pinch.pivot;
      const { xMin, xMax, yMin, yMax } = pinch.viewAtStart;
      view = {
        xMin: wx + (xMin - wx) * factor, xMax: wx + (xMax - wx) * factor,
        yMin: wy + (yMin - wy) * factor, yMax: wy + (yMax - wy) * factor,
      };
      draw();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', () => { drag = null; pinch = null; });

  function zoomAround(factor) {
    const cx = (view.xMin + view.xMax) / 2;
    const cy = (view.yMin + view.yMax) / 2;
    view = {
      xMin: cx + (view.xMin - cx) * factor, xMax: cx + (view.xMax - cx) * factor,
      yMin: cy + (view.yMin - cy) * factor, yMax: cy + (view.yMax - cy) * factor,
    };
    draw();
  }

  document.getElementById('zoom-in-btn').addEventListener('click',  () => zoomAround(0.75));
  document.getElementById('zoom-out-btn').addEventListener('click', () => zoomAround(1.33));
  document.getElementById('reset-btn').addEventListener('click', () => {
    view = { xMin: -10, xMax: 10, yMin: -8, yMax: 8 };
    draw();
  });

  document.getElementById('add-fn-btn').addEventListener('click', () => addFn(''));

  container.querySelectorAll('.grapher-preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const empty = fns.find(f => !f.expr.trim());
      if (empty) {
        empty.expr = btn.dataset.fn;
        rebuildFnList();
        draw();
      } else {
        addFn(btn.dataset.fn);
      }
    });
  });

  // Initialize with x^2
  addFn('x^2');
  resize();
}

      <h2>Transformations of Functions</h2>

      <p><strong>Function transformations</strong> modify a function by shifting, stretching, compressing, or reflecting its graph. Starting with a parent function $f(x)$, we apply transformations using the general form:</p>

      <div class="formula-box">
        <div class="formula-label">Transformation Formula</div>
        $$y = a \\cdot f(b(x - h)) + k$$
      </div>

      <p>Where:</p>
      <ul>
        <li>$a$ controls <strong>vertical stretch/compression and reflection over the $x$-axis</strong>: If $|a| > 1$, stretch; if $0 < |a| < 1$, compress; if $a < 0$, reflect over $x$-axis</li>
        <li>$b$ controls <strong>horizontal stretch/compression and reflection over the $y$-axis</strong>: If $|b| > 1$, compress horizontally; if $0 < |b| < 1$, stretch horizontally; if $b < 0$, reflect over $y$-axis</li>
        <li>$h$ is the <strong>horizontal shift</strong> (left/right): Positive $h$ shifts right, negative $h$ shifts left</li>
        <li>$k$ is the <strong>vertical shift</strong> (up/down): Positive $k$ shifts up, negative $k$ shifts down</li>
      </ul>

      <p><strong>Order of transformations:</strong> Apply horizontal transformations ($b$ and $h$) first, then vertical transformations ($a$ and $k$).</p>

      <h2>Inverse Functions</h2>

      <p>An <strong>inverse function</strong>, denoted $f^{-1}(x)$, reverses the action of the original function $f(x)$. If $f$ takes you from input $x$ to output $y$, then $f^{-1}$ takes you from output $y$ back to input $x$.</p>

      <div class="formula-box">
        <div class="formula-label">Inverse Function Property</div>
        $$f(f^{-1}(x)) = x \\text{ and } f^{-1}(f(x)) = x$$
      </div>

      <p><strong>One-to-One Functions:</strong> Not all functions have inverses. A function must be <strong>one-to-one</strong> (injective) to have an inverse. This means each output comes from exactly one input—no two different inputs produce the same output.</p>

      <p><strong>Horizontal Line Test:</strong> A function is one-to-one if and only if every horizontal line intersects its graph at most once. If any horizontal line intersects the graph more than once, the function is not one-to-one and does not have an inverse.</p>

      <p><strong>Finding an Inverse Algebraically:</strong></p>
      <ol>
        <li>Start with $y = f(x)$</li>
        <li>Swap $x$ and $y$ to get $x = f(y)$</li>
        <li>Solve for $y$ in terms of $x$</li>
        <li>The result is $y = f^{-1}(x)$</li>
      </ol>

      <p><strong>Domain and Range Relationship:</strong> If $f$ has domain $D$ and range $R$, then $f^{-1}$ has domain $R$ and range $D$. The domain and range swap!</p>

      <div class="warning-box">
        <div class="warning-icon">⚠️</div>
        <p>The notation $f^{-1}(x)$ does NOT mean $\\frac{1}{f(x)}$. It specifically denotes the inverse function.</p>

      <h2>Composition of Functions</h2>

      <p><strong>Function composition</strong> means applying one function to the output of another function. We write this as $(f \\circ g)(x)$ (read "$f$ composed with $g$ of $x$") and it means we first apply $g$, then apply $f$ to the result.</p>

      <div class="formula-box">
        <div class="formula-label">Function Composition</div>
        $$(f \\circ g)(x) = f(g(x))$$
      </div>

      <p><strong>How to evaluate a composition:</strong></p>
      <ol>
        <li>First, evaluate the inner function: find $g(x)$</li>
        <li>Then, use that result as the input to the outer function: apply $f$</li>
        <li>The result is $f(g(x))$</li>
      </ol>

      <p><strong>Finding the formula for a composition:</strong> To find $(f \\circ g)(x)$ as an explicit function:</p>
      <ol>
        <li>Take the formula for $f(x)$</li>
        <li>Replace every $x$ in $f$ with the formula for $g(x)$</li>
        <li>Simplify the result</li>
      </ol>

      <p><strong>Domain of a Composite Function:</strong> The domain of $(f \\circ g)(x)$ is the set of all $x$ in the domain of $g$ such that $g(x)$ is in the domain of $f$. You must satisfy:</p>

        <li>$x$ is in the domain of $g$</li>
        <li>$g(x)$ is in the domain of $f$</li>

      <div class="tip-box">

      <h2>Even, Odd & Symmetry</h2>

      <p>Functions can be classified by their symmetry. An <strong>even function</strong> has symmetry about the $y$-axis, while an <strong>odd function</strong> has symmetry about the origin. Many functions are neither even nor odd.</p>

      <div class="formula-box">
        <div class="formula-label">Even and Odd Functions</div>
        $$\\text{Even: } f(-x) = f(x) \\text{ (symmetric about the y-axis)}$$
        $$\\text{Odd: } f(-x) = -f(x) \\text{ (symmetric about the origin)}$$
      </div>

      <p><strong>Geometric Interpretation:</strong></p>
      <ul>
        <li><strong>Even function:</strong> If you fold the graph along the $y$-axis, the left side matches the right side perfectly. Examples: $y = x^2$, $y = \\cos(x)$, $y = |x|$</li>
        <li><strong>Odd function:</strong> The graph has rotational symmetry of 180° about the origin. If you rotate the graph 180° around the origin, it looks the same. Examples: $y = x^3$, $y = x$, $y = \\sin(x)$</li>
      </ul>

      <p><strong>Algebraic Test for Even/Odd:</strong></p>
      <ol>
        <li>Replace $x$ with $-x$ in the function</li>
        <li>Simplify the result</li>
        <li>If $f(-x) = f(x)$, the function is even</li>
        <li>If $f(-x) = -f(x)$, the function is odd</li>
        <li>If neither condition holds, the function is neither even nor odd</li>
      </ol>

      <p><strong>Useful Properties:</strong></p>
      <ul>
        <li>The sum of two even functions is even</li>
        <li>The sum of two odd functions is odd</li>
        <li>The product of two even functions is even</li>
        <li>The product of two odd functions is even</li>
        <li>The product of an even and odd function is odd</li>
        <li>Polynomial functions with only even powers are even; only odd powers are odd</li>
      </ul>

      <div class="tip-box">
        <div class="tip-icon">💡</div>
        <p>A function can be neither even nor odd. For example, $f(x) = x + x^2$ is neither even nor odd because it mixes even and odd terms.</p>
      </div>
    </div>`,

      <h2>Power Functions & End Behavior</h2>

      <h3>Power Functions</h3>
      <p>A <strong>power function</strong> is a function of the form $f(x) = ax^n$, where $a$ is a non-zero real number (the <strong>leading coefficient</strong>) and $n$ is a non-negative integer (the <strong>degree</strong>). Power functions serve as the simplest building blocks for polynomial functions.</p>

      <p>Key characteristics of power functions depend on both the degree $n$ and the leading coefficient $a$:</p>

        <li>When $a > 0$ and $n$ is odd: the function increases from left to right</li>
        <li>When $a < 0$ and $n$ is odd: the function decreases from left to right</li>
      </ul>

      <h3>End Behavior</h3>
      <p>The <strong>end behavior</strong> of a polynomial describes what happens to $f(x)$ as $x \\to \\infty$ and as $x \\to -\\infty$. For any polynomial, the end behavior is determined entirely by the <strong>leading term</strong>, which is the term with the highest degree.</p>

      <p>The end behavior of $f(x) = ax^n$ depends on two factors:</p>

      <h2>Zeros of Polynomials</h2>

      <h3>Finding Zeros and Multiplicity</h3>
      <p>A <strong>zero</strong> (or <strong>root</strong>) of a polynomial $f(x)$ is a value $r$ where $f(r) = 0$. Geometrically, zeros correspond to x-intercepts of the graph. The <strong>multiplicity</strong> of a zero indicates how many times a factor appears in the polynomial's factorization.</p>

      <p>When a polynomial is written in factored form $f(x) = a(x - r_1)^{m_1}(x - r_2)^{m_2} \\cdots (x - r_k)^{m_k}$:</p>
      <ul>
        <li>Each $r_i$ is a zero with multiplicity $m_i$</li>
        <li>If multiplicity is <strong>odd</strong>, the graph <strong>crosses</strong> the x-axis at that zero</li>
        <li>If multiplicity is <strong>even</strong>, the graph <strong>touches but does not cross</strong> the x-axis at that zero (it bounces)</li>
      </ul>

      <h3>The Rational Root Theorem</h3>
      <p>The <strong>Rational Root Theorem</strong> provides a systematic way to find all possible rational zeros of a polynomial with integer coefficients.</p>

      <div class="formula-box">
        <div class="formula-label">Rational Root Theorem</div>
        <p>If $f(x) = a_nx^n + a_{n-1}x^{n-1} + \\cdots + a_1x + a_0$ has integer coefficients and $\\frac{p}{q}$ is a rational zero in lowest terms, then:</p>
        <ul>
          <li>$p$ is a factor of the constant term $a_0$</li>
          <li>$q$ is a factor of the leading coefficient $a_n$</li>
        </ul>
      </div>

      <p>This theorem reduces the work needed to find rational zeros. Instead of testing infinitely many values, we only test a finite list: $\\pm \\frac{\\text{factors of } a_0}{\\text{factors of } a_n}$.</p>

      <h3>Factor Theorem and Remainder Theorem</h3>
      <p>The <strong>Factor Theorem</strong> states: $(x - r)$ is a factor of $f(x)$ if and only if $f(r) = 0$. This connects zeros to factorization directly.</p>

      <p>The <strong>Remainder Theorem</strong> states: When $f(x)$ is divided by $(x - r)$, the remainder is $f(r)$. We can use synthetic division to find remainders quickly.</p>

      <h3>Descartes' Rule of Signs</h3>
      <p>To estimate the number of positive real zeros, count the sign changes in the coefficients of $f(x)$. The number of positive real zeros is either equal to that count or less by an even number.</p>

      <h2>Polynomial Division & Partial Fractions</h2>

      <h3>Polynomial Long Division</h3>
      <p><strong>Polynomial long division</strong> is a method for dividing one polynomial by another, similar to long division with numbers. When dividing $f(x)$ (dividend) by $d(x)$ (divisor), we can write:</p>

        <li>Divide the leading term of the dividend by the leading term of the divisor</li>
        <li>Multiply the entire divisor by this result and subtract from the dividend</li>
        <li>Repeat with the new polynomial until the degree of the remainder is less than the degree of the divisor</li>
      </ol>

      <h3>Synthetic Division</h3>
      <p><strong>Synthetic division</strong> is a faster method for dividing a polynomial by a linear divisor of the form $(x - c)$. It uses only the coefficients, making calculations simpler and less error-prone than long division.</p>

      <p>To use synthetic division to divide $f(x)$ by $(x - c)$:</p>
      <ol>
        <li>Write the value $c$ in a box at the left</li>
        <li>Write the coefficients of $f(x)$ in descending order (use 0 for missing terms)</li>
        <li>Bring down the leading coefficient</li>
        <li>Multiply by $c$ and add to the next coefficient, repeating across the row</li>
        <li>The last number is the remainder; the others are coefficients of the quotient</li>
      </ol>

      <h3>Partial Fraction Decomposition</h3>
      <p><strong>Partial fraction decomposition</strong> breaks a rational function (fraction of polynomials) into a sum of simpler fractions with linear or quadratic denominators. This technique is essential for integration and solving differential equations.</p>

      <p>For a proper rational function $\\frac{N(x)}{D(x)}$ (degree of numerator < degree of denominator):</p>
      <ul>
        <li>If denominator has distinct linear factors $(x - a)(x - b)(x - c)$, decompose as: $\\frac{A}{x - a} + \\frac{B}{x - b} + \\frac{C}{x - c}$</li>
        <li>If denominator has repeated linear factor $(x - a)^n$, use: $\\frac{A_1}{x - a} + \\frac{A_2}{(x - a)^2} + \\cdots + \\frac{A_n}{(x - a)^n}$</li>
        <li>If denominator has irreducible quadratic $x^2 + bx + c$, use: $\\frac{Ax + B}{x^2 + bx + c}$</li>
      </ul>

      <div class="tip-box">
        <div class="tip-icon">💡</div>
        <p><strong>Tip:</strong> For partial fractions, use the cover-up method for distinct linear factors, or solve a system of equations for more complex cases.</p>
      </div>
    </div>`,

  // Lesson 2.5: Rational Functions & Asymptotes

    id: '2.5',
    learn: `<div class="concept-card">
      <h2>Rational Functions & Asymptotes</h2>

      <h3>Vertical Asymptotes</h3>
      <p>A <strong>vertical asymptote</strong> occurs at a value $x = a$ where the denominator equals zero but the numerator does not. The graph approaches the asymptote but never crosses it, shooting to $+\\infty$ or $-\\infty$ as $x$ approaches the asymptote.</p>

      <p>To find vertical asymptotes of $f(x) = \\frac{N(x)}{D(x)}$:</p>
      <ol>
        <li>Factor both numerator and denominator completely</li>
        <li>Cancel any common factors (these create holes, not asymptotes)</li>
        <li>Set the simplified denominator equal to zero</li>
        <li>Solve for $x$ — these are the vertical asymptotes</li>
      </ol>

      <h3>Horizontal Asymptotes</h3>
      <p>A <strong>horizontal asymptote</strong> is a horizontal line $y = L$ that the function approaches as $x \\to \\infty$ or $x \\to -\\infty$. The horizontal asymptote depends on the degrees of the numerator and denominator.</p>

      <div class="formula-box">
        <div class="formula-label">Finding Horizontal Asymptotes</div>
        <p>For $f(x) = \\frac{a_nx^n + \\cdots}{b_mx^m + \\cdots}$:</p>
        <ul>
          <li>If $n < m$: horizontal asymptote is $y = 0$</li>
          <li>If $n = m$: horizontal asymptote is $y = \\frac{a_n}{b_m}$ (ratio of leading coefficients)</li>
          <li>If $n > m$: no horizontal asymptote (there is a slant asymptote if $n = m + 1$)</li>
        </ul>
      </div>

      <h3>Slant (Oblique) Asymptotes</h3>
      <p>A <strong>slant asymptote</strong> or <strong>oblique asymptote</strong> occurs when the degree of the numerator is exactly one more than the degree of the denominator. To find it, perform polynomial long division: the quotient (ignoring the remainder) is the slant asymptote.</p>

      <h3>Holes</h3>
      <p>A <strong>hole</strong> (or <strong>removable discontinuity</strong>) occurs where a common factor cancels from the numerator and denominator. There is no asymptote here; instead, the function is undefined at that point but the limit exists.</p>

      <p>To find a hole at $x = c$:</p>
      <ol>
        <li>Factor numerator and denominator</li>
        <li>Cancel common factors (these create the hole)</li>
        <li>Evaluate the simplified function at $x = c$ to find the y-coordinate of the hole</li>
      </ol>

      <div class="tip-box">
        <div class="tip-icon">💡</div>
        <p><strong>Tip:</strong> Vertical asymptotes and holes both occur where the denominator is zero. The difference: if a factor cancels, it's a hole; if it doesn't cancel, it's a vertical asymptote.</p>
      </div>
    </div>`,

      <p>The sign of a rational function changes only at vertical asymptotes and zeros (x-intercepts). To perform sign analysis:</p>

  // Lesson 2.7: Polynomial & Rational Inequalities

      <h2>Polynomial & Rational Inequalities</h2>

      <h3>Sign Charts and Test Intervals</h3>
      <p>To solve polynomial and rational inequalities, we use <strong>sign analysis</strong> with a sign chart. The key insight is that the expression changes sign only at its zeros and undefined points (for rational expressions).</p>

      <p>For an inequality like $f(x) > 0$, we:</p>
      <ol>
        <li>Move all terms to one side so we have an expression like $p(x) > 0$ or $\\frac{p(x)}{q(x)} > 0$</li>
        <li>Find all critical values: zeros of the numerator and denominator</li>
        <li>Create a sign chart with these critical values dividing the number line into intervals</li>
        <li>Choose a test point in each interval and evaluate the sign</li>
        <li>Determine which intervals satisfy the inequality</li>
        <li>Combine the solution intervals, being careful about whether endpoints are included</li>
      </ol>

      <h3>Solving Polynomial Inequalities</h3>
      <p>For a polynomial inequality, the solution set is made up of intervals where the polynomial has the required sign. Endpoints where the polynomial equals zero are included if the inequality is $\\geq$ or $\\leq$, and excluded if it is $>$ or $<$.</p>

      <div class="formula-box">
        <div class="formula-label">Polynomial Inequality Method</div>
        <ol>
          <li>Rearrange to get all terms on one side: $p(x) \\geq 0$ (or $<, >, \\leq$)</li>
          <li>Factor completely</li>
          <li>Find all real zeros (critical values)</li>
          <li>Create a sign chart using the zeros to mark intervals</li>
          <li>Test the sign in each interval</li>
          <li>Select intervals satisfying the inequality (include endpoints if $\\geq$ or $\\leq$)</li>
        </ol>
      </div>

      <h3>Solving Rational Inequalities</h3>
      <p>For rational inequalities, the method is similar, but we must exclude values where the denominator is zero.</p>

      <p>Important: When multiplying or dividing a rational inequality by an expression, be careful of its sign:</p>
      <ul>
        <li>Multiplying/dividing by a positive expression: inequality sign stays the same</li>
        <li>Multiplying/dividing by a negative expression: inequality sign flips</li>
      </ul>

      <p>The safer approach is to move everything to one side and analyze the resulting fraction's sign, rather than clearing denominators.</p>

      <div class="tip-box">
        <div class="tip-icon">⚠️</div>
        <p><strong>Warning:</strong> When solving $\\frac{f(x)}{g(x)} < 0$, do not multiply both sides by $g(x)$ unless you know its sign. Instead, analyze the sign of the fraction directly using a sign chart.</p>
      </div>
    </div>`,

      <h3>Sine & Cosine Functions</h3>
      <p>The sine and cosine functions are the most fundamental trigonometric functions. Understanding their transformations and key characteristics is essential for analyzing periodic phenomena.</p>

      <h4>The Transformed Sine and Cosine Functions</h4>
      <p>The general forms of the transformed sine and cosine functions are:</p>
      <div class="formula-box">

      <p><strong>Amplitude ($|A|$):</strong> The maximum distance from the centerline. The function oscillates between $-|A|$ and $|A|$ around the centerline.</p>
      <p><strong>Period:</strong> The length of one complete cycle. The period is found using:</p>
      <div class="formula-box">
        <span class="formula-label">Period Formula</span>
        $$\\text{Period} = \\frac{2\\pi}{|B|}$$
      </div>

      <p><strong>Phase Shift:</strong> The horizontal displacement of the graph. A phase shift of $\\frac{C}{B}$ means the graph shifts right by $\\frac{C}{B}$ units (if positive) or left by $\\left|\\frac{C}{B}\\right|$ units (if negative).</p>
      <p><strong>Vertical Shift ($D$):</strong> The vertical displacement. The centerline of the function is at $y = D$ instead of $y = 0$.</p>

      <h4>Domain, Range, and Key Points</h4>

      <h3>Other Trigonometric Functions</h3>
      <p>Beyond sine and cosine, there are four additional trigonometric functions: tangent, cotangent, secant, and cosecant. These are defined in terms of sine and cosine and have unique characteristics and applications.</p>

      <div class="formula-box">
