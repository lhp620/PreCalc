        $$\\cot x = \\frac{\\cos x}{\\sin x}$$
        $$\\sec x = \\frac{1}{\\cos x}$$
        $$\\csc x = \\frac{1}{\\sin x}$$
      </div>

      <h4>The Tangent Function</h4>
      <p>The tangent function has a period of $\\pi$ (not $2\\pi$ like sine and cosine). The graph has vertical asymptotes where cosine equals zero, which occurs at $x = \\frac{\\pi}{2} + n\\pi$ for any integer $n$. The function passes through the origin and increases throughout its domain.</p>

      <h4>The Cotangent Function</h4>
      <p>Cotangent is the reciprocal of tangent. It also has period $\\pi$, with vertical asymptotes at $x = n\\pi$ (where sine equals zero). Unlike tangent, cotangent decreases throughout its domain between asymptotes.</p>

      <h4>The Secant and Cosecant Functions</h4>
      <p>Secant (the reciprocal of cosine) and cosecant (the reciprocal of sine) both have period $2\\pi$. They have vertical asymptotes where their respective reciprocal functions equal zero, and their graphs have distinctive "U" shapes between asymptotes.</p>

      <h4>Reciprocal Function Relationship</h4>
      <p>Since sec and csc are reciprocals of cos and sin respectively:</p>

      <p>Trigonometric identities are equations that are true for all valid values of the variable. The fundamental identities form the foundation for all trigonometric manipulation.</p>

      <h2>Introduction to Vectors</h2>
      <p>A <strong>vector</strong> is a quantity that has both magnitude (size) and direction. Unlike a <strong>scalar</strong> (which has only magnitude, like temperature or distance), vectors are used to represent forces, velocities, displacements, and other directional quantities.</p>

      <ul>

      <div class="formula-box">

        $$x = f(t), \\quad y = g(t)$$
      </div>

      <p>As $t$ varies over an interval, the point $(x(t), y(t))$ traces out a curve in the plane.</p>

      <h4>Eliminating the Parameter</h4>
      <p>To find the rectangular equation, we eliminate $t$ by solving one equation for $t$ and substituting into the other:</p>
      <ul>
        <li>If $x = 2t$ and $y = t^2$, then $t = \\frac{x}{2}$, so $y = (\\frac{x}{2})^2 = \\frac{x^2}{4}$</li>
        <li>If $x = \\cos t$ and $y = \\sin t$, then $x^2 + y^2 = \\cos^2 t + \\sin^2 t = 1$</li>
      </ul>

      <div class="tip-box">

        <p><strong>Parameter Restrictions:</strong> The parametric form may trace only part of the rectangular curve. Always note the domain of $t$ and which portion of the curve is traced.</p>

      <p>The same rectangular equation can have multiple parametric representations:</p>
      <ul>

        <p>If both conditions are satisfied, then $P(n)$ is true for all positive integers $n$.</p>

        <h2>Intuitive Concept of Limits</h2>
        <p>A <strong>limit</strong> describes the value that a function approaches as the input approaches some value. Unlike simply evaluating a function, a limit asks: "What does $f(x)$ get closer and closer to as $x$ gets closer and closer to some number?"</p>

        <div class="formula-box">
          <div class="formula-label">Limit Notation</div>
          $$\\lim_{x \\to a} f(x) = L$$
          <p style="font-size: 0.9em; margin-top: 8px;">This reads: "The limit of $f(x)$ as $x$ approaches $a$ is $L$"</p>
        </div>

        <h3>Approaching from Both Sides</h3>
        <p>For a limit to exist at $x = a$, the function must approach the same value whether we approach $a$ from the left (values less than $a$) or from the right (values greater than $a$). This is crucial—we never actually plug in $x = a$!</p>

        <p><strong>Why?</strong> The limit might exist even if $f(a)$ is undefined, or even if $f(a) \\neq L$. We only care about the behavior <em>near</em> $a$, not <em>at</em> $a$.</p>

        <p>One practical method is to create a table of $x$ values approaching our target value from both sides, and observe what $f(x)$ approaches:</p>

          $x$ approaching 2 from right: 2.1, 2.01, 2.001, ... $\\rightarrow$ $f(x)$ approaches the same value
        </p>

        <h3>Limits That Don't Exist</h3>

      <div class="concept-card">
        <h2>Continuity</h2>
        <p>A function is <strong>continuous</strong> at a point if there's no "break" in the graph at that point—the function is connected. Continuity requires three conditions:</p>

        <div class="formula-box">
          <div class="formula-label">Definition of Continuity at $x = a$</div>
          <p>A function $f$ is continuous at $x = a$ if and only if:</p>
          <ol style="margin: 10px 0;">
            <li>$f(a)$ exists (the function is defined at $a$)</li>
            <li>$\\lim_{x \\to a} f(x)$ exists</li>
            <li>$\\lim_{x \\to a} f(x) = f(a)$</li>
          </ol>
        </div>

        <p>If any of these three conditions fails, the function is <strong>discontinuous</strong> at $a$.</p>

        <h3>Types of Discontinuities</h3>

        <p><strong>Removable Discontinuity (Hole):</strong></p>
        <ul>
          <li>The limit exists but either $f(a)$ is undefined or $f(a) \\neq \\lim_{x \\to a} f(x)$</li>
          <li>The "hole" can be "filled" by redefining $f(a) = \\lim_{x \\to a} f(x)$</li>
          <li>Example: $f(x) = \\frac{x^2 - 1}{x - 1}$ has a hole at $x = 1$</li>
        </ul>

        <p><strong>Jump Discontinuity:</strong></p>
        <ul>
          <li>The one-sided limits exist but are not equal: $\\lim_{x \\to a^-} f(x) \\neq \\lim_{x \\to a^+} f(x)$</li>
          <li>Cannot be removed; the function truly "jumps"</li>
          <li>Common in piecewise functions</li>
        </ul>

        <p><strong>Infinite Discontinuity (Asymptote):</strong></p>
        <ul>
          <li>The function grows unbounded: $\\lim_{x \\to a} f(x) = \\pm\\infty$</li>
          <li>Occurs at vertical asymptotes</li>
          <li>Example: $f(x) = \\frac{1}{x}$ at $x = 0$</li>
        </ul>

        <h3>The Intermediate Value Theorem (IVT)</h3>
        <p>IVT is a powerful consequence of continuity:</p>

        <div class="formula-box">
          <div class="formula-label">Intermediate Value Theorem</div>
          <p>If $f$ is continuous on $[a, b]$ and $N$ is any value between $f(a)$ and $f(b)$, then there exists at least one point $c$ in $(a, b)$ where $f(c) = N$.</p>
        </div>

        <p><strong>Intuition:</strong> A continuous function must pass through every $y$-value between its starting and ending heights.</p>

      <div class="concept-card">
        <h2>Rates of Change</h2>
        <p>A <strong>rate of change</strong> measures how fast a quantity changes. In calculus, we study both average and instantaneous rates of change.</p>

        <h3>Average Rate of Change</h3>
        <p>The <strong>average rate of change</strong> of a function over an interval $[a, b]$ is the slope of the line connecting two points on the graph.</p>

        <div class="formula-box">
          <div class="formula-label">Average Rate of Change</div>
          $$\\text{Average Rate} = \\frac{\\Delta f}{\\Delta x} = \\frac{f(b) - f(a)}{b - a}$$
          <p style="font-size: 0.9em; margin-top: 8px;">This is the slope of the <strong>secant line</strong> through points $(a, f(a))$ and $(b, f(b))$.</p>
        </div>

        <p><strong>Interpretation:</strong> It tells us how much, on average, the output changes per unit change in input over the interval.</p>

        <p><strong>Example:</strong> If a car travels 200 miles in 4 hours, the average speed is $\\frac{200 \\text{ mi}}{4 \\text{ hr}} = 50 \\text{ mph}$.</p>

        <h3>Instantaneous Rate of Change</h3>
        <p>The <strong>instantaneous rate of change</strong> at a specific point $x = a$ is the slope of the line <em>tangent</em> to the curve at that point.</p>

        <p>We find it by taking the limit of average rates as the interval shrinks to zero:</p>

        <div class="formula-box">
          <div class="formula-label">Instantaneous Rate of Change</div>
          $$\\text{Instantaneous Rate at } a = \\lim_{h \\to 0} \\frac{f(a+h) - f(a)}{h}$$
          <p style="font-size: 0.9em; margin-top: 8px;">This is the slope of the <strong>tangent line</strong> at $(a, f(a))$. This limit is called the <strong>derivative</strong> of $f$ at $a$, denoted $f'(a)$.</p>
        </div>

        <div class="tip-box">

        <p><strong>Average rate:</strong> Slope of secant line (connects two points)</p>
        <p><strong>Instantaneous rate:</strong> Slope of tangent line (touches at one point)</p>

        <p>The derivative is the instantaneous rate of change—a foundational concept in calculus.</p>

      <div class="concept-card">
        <h2>Preview of the Derivative</h2>
        <p>The <strong>derivative</strong> is one of the central concepts in calculus. It formalizes the idea of the instantaneous rate of change and the slope of a tangent line.</p>

        <div class="formula-box">
          <div class="formula-label">Definition of the Derivative</div>
          $$f'(a) = \\lim_{h \\to 0} \\frac{f(a+h) - f(a)}{h}$$
          <p style="font-size: 0.9em; margin-top: 8px;">$f'(a)$ (read "$f$ prime of $a$") is the derivative of $f$ at $x = a$, representing the instantaneous rate of change.</p>
        </div>

        <p><strong>Alternative form:</strong> $f'(a) = \\lim_{x \\to a} \\frac{f(x) - f(a)}{x - a}$ (approaching $a$ instead of using a small step $h$)</p>

        <h3>Geometric Meaning</h3>
        <p>The derivative $f'(a)$ is the <strong>slope of the tangent line</strong> to the curve $y = f(x)$ at the point $(a, f(a))$.</p>

        <h3>The Tangent Line Equation</h3>
        <p>Once we have the slope $m = f'(a)$ and a point $(a, f(a))$, we can write the equation of the tangent line using point-slope form:</p>

        <div class="formula-box">
          <div class="formula-label">Equation of the Tangent Line</div>
          $$y - f(a) = f'(a)(x - a)$$
          <p style="font-size: 0.9em; margin-top: 8px;">Or in slope-intercept form: $y = f'(a)x + [f(a) - a \\cdot f'(a)]$</p>
        </div>

        <h3>Derivatives of Basic Functions</h3>
        <p>Though we focus on computing derivatives from first principles here, you'll eventually learn shortcuts:</p>
        <ul>
          <li>Derivative of a constant: $f(x) = c \\Rightarrow f'(x) = 0$</li>
          <li>Derivative of a linear function: $f(x) = mx + b \\Rightarrow f'(x) = m$</li>
          <li>Power rule (preview): $f(x) = x^n \\Rightarrow f'(x) = nx^{n-1}$</li>
        </ul>

        <p>But here, we compute derivatives directly from the limit definition.</p>

        <div class="tip-box">
          <div class="tip-icon">💡</div>
          <p><strong>Key Insight:</strong> The derivative tells us the <em>rate at which</em> a function is changing at a specific instant. It's like the speedometer reading (instantaneous speed) vs. average speed over a trip.</p>
        </div>

        <h3>When Does a Derivative Exist?</h3>
        <p>A function has a derivative at $x = a$ if:</p>
        <ul>
          <li>The function is continuous at $a$</li>
          <li>The left-hand and right-hand limits of $\\frac{f(x) - f(a)}{x - a}$ are equal (the tangent line doesn't have a "sharp corner")</li>
        </ul>

        <p>A sharp corner, cusp, or vertical tangent means the derivative doesn't exist at that point.</p>
      </div>

// PROGRESS MANAGEMENT
// ============================================================
const STORAGE_KEY = 'precalc_progress_v1';
const STREAK_KEY  = 'precalc_streak_v1';

function getProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}

function getStreak() {
  try {
    const s = JSON.parse(localStorage.getItem(STREAK_KEY) || '{"count":0,"lastDay":""}');
    return s.count || 0;
  } catch { return 0; }
}

function updateStreak() {
  try {
    const s = JSON.parse(localStorage.getItem(STREAK_KEY) || '{"count":0,"lastDay":""}');
    const today = new Date().toDateString();
    if (s.lastDay !== today) {
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      s.count = s.lastDay === yesterday ? s.count + 1 : 1;
      s.lastDay = today;
      localStorage.setItem(STREAK_KEY, JSON.stringify(s));
    }
  } catch {}
}

function setLessonMastered(lessonId, score, total) {
  const p = getProgress();
  const prev = p[lessonId] || {};
  p[lessonId] = {
    status: score / total >= 0.8 ? 'mastered' : 'attempted',
    score,
    total,
    bestScore: Math.max(score, prev.bestScore || 0),
    lastVisited: Date.now(),
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
  updateStreak();
}

function markLessonVisited(lessonId) {
  const p = getProgress();
  if (!p[lessonId]) {
    p[lessonId] = { status: 'in-progress', score: 0, total: 0, lastVisited: Date.now() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
  }
}

function getLessonStatus(lessonId) {
  return getProgress()[lessonId]?.status || 'not-started';
}

function getUnitProgress(unitId) {
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit) return { count: 0, total: 0, pct: 0 };
  const p = getProgress();
  const mastered = unit.lessons.filter(l => p[l.id]?.status === 'mastered').length;
  return { count: mastered, total: unit.lessons.length, pct: Math.round((mastered / unit.lessons.length) * 100) };
}

function getTotalProgress() {
  const p = getProgress();
  const mastered = Object.values(p).filter(v => v.status === 'mastered').length;
  return { count: mastered, total: TOTAL_LESSONS, pct: Math.round((mastered / TOTAL_LESSONS) * 100) };
}

async function handleRoute() {
  const hash  = location.hash.slice(1) || 'home';
  const parts = hash.split('/');
  const page  = parts[0];
  const param = parts[1];

  // Update active nav
  document.querySelectorAll('[data-nav]').forEach(a => {
    a.classList.toggle('active', a.dataset.nav === page || (page === 'home' && a.dataset.nav === 'home'));
  });

  // Snap out (no transition so there's no flash)
  const main = document.getElementById('main-content');
  main.style.transition = 'none';
  main.style.opacity    = '0';
  main.style.transform  = 'translateY(10px)';

  if (page === 'unit' && param) {
    await renderUnitPage(parseInt(param));
  } else if (page === 'lesson' && param) {
    await renderLessonPage(param);
  } else if (page === 'formulas') {
    await renderFormulasPage();
  } else if (page === 'graph') {
    await renderGraphPage();
  } else {
    renderHomePage();
  }

  // Animate in on next frame
  requestAnimationFrame(() => {
    main.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
    main.style.opacity    = '1';
    main.style.transform  = 'translateY(0)';
  });

  updateHeaderProgress();
}

const LESSON_CACHE = {};

async function getLessonData(unitId, lessonId) {
  if (LESSON_CACHE[lessonId]) return LESSON_CACHE[lessonId];
  try {
    const mod = (__unitLessons[`./data/lessons/unit${unitId}.js`] || { lessons: [] });
    (mod.lessons || []).forEach(l => { LESSON_CACHE[l.id] = l; });
    return LESSON_CACHE[lessonId] || null;
  } catch (err) {
    console.error('Could not load lesson data for unit', unitId, err);
    return null;
  }
}

function getPrevNext(lessonId) {
  const all = UNITS.flatMap(u => u.lessons.map(l => ({ ...l, unitId: u.id })));
  const idx = all.findIndex(l => l.id === lessonId);
  return { prev: idx > 0 ? all[idx - 1] : null, next: idx < all.length - 1 ? all[idx + 1] : null };
}

          <div class="lesson-nav" role="tablist">
            <button class="lesson-tab active" data-tab="learn">📖 Learn</button>
            <button class="lesson-tab" data-tab="examples">📝 Examples</button>
            <button class="lesson-tab" data-tab="practice">✅ Practice</button>
          </div>
        </div>

        <div id="tab-learn"    class="lesson-section active">${lesson.learn || '<p>Content coming soon.</p>'}</div>
        <div id="tab-examples" class="lesson-section">${renderExamples(lesson.examples)}</div>
        <div id="tab-practice" class="lesson-section"><div id="quiz-mount"></div></div>

        <div style="display:flex;justify-content:space-between;gap:16px;margin-top:48px;padding-top:24px;border-top:1px solid var(--color-border);flex-wrap:wrap">
          ${prev ? `<a href="#lesson/${prev.id}" class="btn btn-secondary">← ${prev.title}</a>` : '<span></span>'}
          <a href="#unit/${unitId}" class="btn btn-secondary">Unit ${unitId} Overview</a>
          ${next ? `<a href="#lesson/${next.id}" class="btn btn-primary">${next.title} →</a>` : '<span></span>'}
        </div>
      </div>
    </div>
  `;

  // Tab switching
  document.querySelectorAll('.lesson-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.lesson-tab').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.lesson-section').forEach(s => s.classList.toggle('active', s.id === `tab-${tab}`));

      if (tab === 'practice') {
        const mount = document.getElementById('quiz-mount');
        if (!mount.dataset.initialized) {
          mount.dataset.initialized = 'true';
          renderQuiz(mount, lesson.practice || [], lessonId, accent, setLessonMastered, updateHeaderProgress);
        }
      }
      renderMath(document.getElementById(`tab-${tab}`));
    });
  });

  renderMath(main);
}

function breadcrumb(unitId, unitTitle, lessonTitle) {
  return `
    <nav class="breadcrumb">
      <a href="#home">Home</a>
      <span class="sep">›</span>
      <a href="#unit/${unitId}">Unit ${unitId}: ${unitTitle}</a>
      <span class="sep">›</span>
      <span>${lessonTitle}</span>
    </nav>
  `;
}

function renderExamples(examples) {
  if (!examples || examples.length === 0) {
    return '<div class="concept-card"><p style="color:var(--color-text-muted)">Examples coming soon.</p></div>';
  }
  return examples.map((ex, i) => `
    <div class="example-step">
      <h4><span class="step-number">${i + 1}</span>&nbsp; Example ${i + 1}</h4>
      <div style="padding:14px 18px;background:rgba(124,58,237,0.06);border-radius:8px;margin-bottom:16px;color:var(--color-text-primary);font-size:0.95rem">
        <strong>Problem:</strong> ${ex.problem}
      </div>
      ${ex.steps.map((step, si) => `
        <div style="display:flex;gap:12px;margin-bottom:12px;align-items:flex-start">
          <span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;min-width:22px;border-radius:50%;background:rgba(6,182,212,0.15);color:var(--color-cyan);font-size:0.72rem;font-weight:700;margin-top:2px">${si + 1}</span>
          <p style="margin:0;color:var(--color-text-secondary);font-size:0.93rem;line-height:1.7">${step}</p>
        </div>
      `).join('')}
      <div style="padding:10px 16px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:8px;margin-top:8px">
        <strong style="color:var(--color-emerald)">Answer:</strong>
        <span style="color:var(--color-text-primary);margin-left:6px">${ex.answer}</span>
      </div>
    </div>
  `).join('');
}

// ============================================================
// FORMULAS PAGE
// ============================================================
async function renderFormulasPage() {
  const main = document.getElementById('main-content');
  let formulas = [];
  try {
    formulas = FORMULAS || [];
  } catch { /* formulas empty */ }

  main.innerHTML = `
    <div style="padding:48px 0 80px">
      <div class="container">
        <nav class="breadcrumb">
          <a href="#home">Home</a>
          <span class="sep">›</span>
          <span>Formula Reference</span>
        </nav>
        <h1 style="margin:16px 0 8px">Formula Reference</h1>
        <p style="color:var(--color-text-muted);margin-bottom:32px">All key Pre-Calculus formulas. Search by topic, unit, or keyword.</p>
        <div class="formula-search">
          <span class="search-icon">🔍</span>
          <input type="text" id="formula-search-input"
                 placeholder="Search formulas… (e.g. sine, vector, limit)"
                 oninput="filterFormulas(this.value)" autocomplete="off">
        </div>
        <div id="formula-grid" class="formula-grid">
          ${formulas.map(f => `
            <div class="formula-card" data-keywords="${(f.name + ' ' + (f.tags || []).join(' ') + ' ' + f.unit).toLowerCase()}">
              <h4>${f.unit} — ${f.name}</h4>
              <div class="formula-box" style="margin:0;padding:16px">$$${f.formula}$$</div>
              ${f.notes ? `<p style="margin-top:8px;margin-bottom:0">${f.notes}</p>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;

  window.filterFormulas = q => {
    const lq = q.toLowerCase().trim();
    document.querySelectorAll('.formula-card').forEach(card => {
      card.style.display = !lq || card.dataset.keywords.includes(lq) ? '' : 'none';
    });
  };

  renderMath(main);
}

async function renderGraphPage() {
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div style="padding:48px 0 80px">
      <div class="container">
        <nav class="breadcrumb">
          <a href="#home">Home</a>
          <span class="sep">›</span>
          <span>Function Grapher</span>
        </nav>
        <h1 style="margin:16px 0 8px">Function Grapher</h1>
        <p style="color:var(--color-text-muted);margin-bottom:24px">
          Plot any function of x. Pan by dragging, zoom with scroll or buttons.
          Try <code style="color:var(--color-violet-light)">sin(x)</code>,
          <code style="color:var(--color-violet-light)">x^2</code>,
          <code style="color:var(--color-violet-light)">2^x</code>, and more.
        </p>
        <div id="grapher-mount"></div>
      </div>
    </div>
  `;
  try {
        renderGrapher(document.getElementById('grapher-mount'));
  } catch (err) {
    console.error('Grapher failed to load:', err);
    document.getElementById('grapher-mount').innerHTML = '<p style="color:var(--color-rose)">Could not load the grapher. Please refresh.</p>';
  }
}
